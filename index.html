<script>
const API = "https://fullsack.onrender.com";

async function loadIdeas(){
    const res = await fetch(API + "/all_ideas");

    if(!res.ok){
        console.log("Ошибка сервера");
        return;
    }

    const data = await res.json();

    const list = document.getElementById("ideasList");
    list.innerHTML = "";

    if(!data.ideas) return;

    data.ideas.forEach(idea => {
        const div = document.createElement("div");
        div.className = "idea";
        div.innerText = idea;
        list.appendChild(div);
    });
}

async function addIdea(){
    const input = document.getElementById("ideaInput");
    const idea = input.value;

    if(!idea){
        alert("Введите идею!");
        return;
    }

    await fetch(API + "/add_idea", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({idea})
    });

    input.value = "";
    loadIdeas();
}

async function getRandomIdea(){
    const res = await fetch(API + "/random_idea");

    if(!res.ok){
        document.getElementById("randomIdea").innerText = "Ошибка API";
        return;
    }

    const data = await res.json();
    document.getElementById("randomIdea").innerText = data.idea || "Нет идей";
}

window.onload = loadIdeas;
</script>
