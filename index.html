<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>💡 Генератор идей</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
}

.container{
    width:900px;
    max-width:95%;
    margin:auto;
    padding:30px;
}

h1{
    text-align:center;
}

input{
    padding:10px;
    width:70%;
    border:none;
    border-radius:6px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#00c6ff;
    color:black;
    font-weight:bold;
}

button:hover{
    background:#00a6d6;
}

.idea{
    background:rgba(255,255,255,0.15);
    padding:10px;
    margin-top:10px;
    border-radius:6px;
}

.random{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>💡 Генератор идей</h1>

<h2>Добавить идею</h2>

<input id="ideaInput" placeholder="Введите идею">
<button onclick="addIdea()">Добавить</button>

<h2>Случайная идея</h2>

<button onclick="getRandomIdea()">Получить идею</button>

<div id="randomIdea" class="random"></div>

<h2>Все идеи</h2>

<div id="ideasList"></div>

</div>

<script>

const API = "https://fullsack.onrender.com";

async function loadIdeas(){

    const res = await fetch(API + "/all_ideas");

    if(!res.ok){
        console.log("Ошибка сервера");
        return;
    }

    const data = await res.json();

    const list = document.getElementById("ideasList");

    list.innerHTML = "";

    if(!data.ideas) return;

    data.ideas.forEach(idea => {

        const div = document.createElement("div");

        div.className = "idea";

        div.innerText = idea;

        list.appendChild(div);

    });

}

async function addIdea(){

    const input = document.getElementById("ideaInput");

    const idea = input.value.trim();

    if(!idea){
        alert("Введите идею!");
        return;
    }

    await fetch(API + "/add_idea", {

        method: "POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({idea})

    });

    input.value = "";

    loadIdeas();

}

async function getRandomIdea(){

    const res = await fetch(API + "/random_idea");

    const element = document.getElementById("randomIdea");

    if(!res.ok){

        element.innerText = "Ошибка API";

        return;

    }

    const data = await res.json();

    element.innerText = data.idea || "Нет идей";

}

window.onload = loadIdeas;

</script>

</body>
</html>
